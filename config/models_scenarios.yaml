# vllm bench serve启动配置
base_config:
  base_url: "http://localhost:8001"  # 模型服务地址
  params:
    dataset-name: random
    #max-concurrency: [ 1, 5, 10]  # 海光机器docker环境第一次测试并发数
    #max-concurrency: [ 20, 30, 50, 100] #海光机器docker环境第二次测试并发数
    
    #num-prompts: [ 300 ] # 海光机器docker环境第一次测试请求数
    #num-prompts: [ 500 ] # 海光机器docker环境第二次测试请求数
    num-prompts: [ 1000 ]

#    random-input-len: [ 2048, 10240, 20480, 51200, 102400]
#    random-input-len: [ 10240] # 海光机器docker环境第一次测试输入长度
#    random-input-len: [ 20480] # 海光机器docker环境第二次测试输入长度 
    random-input-len: [ 20480] 

    #random-output-len: [ 256 ] # 海光机器docker环境第一次测试输出长度
    #random-input-len: [ 1024 ] # 海光机器docker环境第二次测试输出长度
    random-input-len: [ 1024 ]
  temperature: 0.7
  seed: 123
  ready-check-timeout-sec: 30

