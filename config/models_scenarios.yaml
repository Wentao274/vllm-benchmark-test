# vllm bench serve启动配置
base_config:
  base_url: "http://127.0.0.1:8080"  # 模型服务地址
  params:
    dataset-name: random
    max-concurrency: [ 1, 2, 4, 8, 10, 16, 32, 64, 80, 128 ]
    num-prompts: [ 320 ]
    random-input-len: [ 10240 ]
    random-output-len: [ 256 ]
  temperature: 0.7
  seed: 123
  ready-check-timeout-sec: 30

models:
  hygon_bw1000:
  - name: "minimax-m2.5"
    served-model-name: "minimax-m2.5"
    model_path: "/data/models/MiniMax-M2.5-bf16"
  kunlun_p800:
  - name: "MiniMax2.5"
    served-model-name: "MiniMax2.5"
    model_path: "/data/MiniMax-M2.5-W8A8-INT8-Dynamic"
  nvidia_h100:
  - name: "minimax-m2.5"
    served-model-name: "minimax-m2.5"
    model_path: "/userdata/llms/MiniMax/MiniMax-M2.5"

# vLLM 版本
#vllm_version: "0.17.0"  # 如 "0.17.0"
vllm_version: "0.15.1"  # 如 "0.17.0"
